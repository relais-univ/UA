<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Social - Université de l'Unité Africaine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" sizes="192x192" href="logo-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="logo-512.png">
    <script src="https://cdn.jsdelivr.net/npm/browser-image-compression@2.0.2/dist/browser-image-compression.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.0.0/firebase-storage-compat.js"></script>
    
    <style>
        .ua-green { background-color: #008751; }
        .active-nav { color: #008751 !important; border-top: 3px solid #008751; }
        .view-section { display: none; }
        .view-section.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1); }
        .input-pro { width: 100%; background: #f3f4f6; border-radius: 15px; padding: 12px 15px; border: 2px solid transparent; outline: none; transition: 0.3s; font-size: 14px; }
        .input-pro:focus { border-color: #008751; background: white; }
        .ua-logo { background: white; }
        .ua-logo span { color: #008751 !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        #ua-toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(100px); background: #1f2937; color: white; padding: 12px 24px; border-radius: 50px; font-weight: 600; font-size: 13px; z-index: 1000; transition: all 0.4s ease; opacity: 0; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 15px rgba(0,0,0,0.3); }
        #ua-toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        .sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100%; background: white; z-index: 300; transition: left 0.3s ease; box-shadow: 2px 0 10px rgba(0,0,0,0.1); overflow-y: auto; }
        .sidebar.open { left: 0; }
        .sidebar-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 299; display: none; }
        .sidebar-overlay.open { display: block; }
        .menu-item { padding: 12px 20px; border-bottom: 1px solid #e5e7eb; cursor: pointer; transition: background 0.2s; }
        .menu-item:hover { background: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 font-sans pb-24">
    <!-- Le contenu HTML reste celui que tu as envoyé, la suite est le script corrigé -->

    <script>
        // CONFIGURATION ET INITIALISATION
        const firebaseConfig = { /* Ton config Firebase ici */ };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const storage = firebase.storage();
        let currentUser = null;

        // AUTOMATISATION CITATIONS (SANS ADMIN)
        const citations = [
            { text: "Le succès n'est pas final, l'échec n'est pas fatal.", author: "Winston Churchill" },
            { text: "La discipline est le pont entre les objectifs et la réalisation.", author: "Jim Rohn" },
            { text: "La seule façon de faire du bon travail est d'aimer ce que vous faites.", author: "Steve Jobs" },
            { text: "L'éducation est l'arme la plus puissante pour changer le monde.", author: "Nelson Mandela" }
        ];

        function genererCitation() {
            const textElem = document.getElementById('citation-text');
            const authorElem = document.getElementById('citation-author');
            if (!textElem) return;
            const c = citations[Math.floor(Math.random() * citations.length)];
            textElem.textContent = `"${c.text}"`;
            authorElem.textContent = `— ${c.author}`;
        }

        function switchView(viewId) {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.getElementById(`view-${viewId}`).classList.add('active');
            if (viewId === 'search') genererCitation();
        }

        function openSidebar() { document.getElementById('sidebar').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('open'); }
        function closeSidebar() { document.getElementById('sidebar').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('open'); }
        function showToast(msg) {
            const t = document.getElementById('ua-toast');
            document.getElementById('toast-message').textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 3000);
        }
    </script>
