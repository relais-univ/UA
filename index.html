<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Zen & Réussite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 min-h-screen pb-28">

    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg relative p-4">
        
        <div class="text-center my-6">
            <span class="text-4xl">💡</span>
            <h1 class="text-xl font-bold text-green-700 mt-2">Espace Zen & Réussite</h1>
            <p class="text-xs text-gray-500 px-6 mt-1">Apaise ton esprit et booste ta motivation pour réussir ensemble.</p>
        </div>

        <div class="bg-green-50/60 border border-green-100 rounded-2xl p-5 mb-6 relative overflow-hidden">
            <span class="text-xs font-bold text-green-700 uppercase tracking-wider block mb-2">💡 Pensée du jour</span>
            <p id="citation-text" class="text-sm italic text-gray-700 font-medium">"Chargement de la motivation..."</p>
            <p id="citation-author" class="text-xs text-green-600 font-bold text-right mt-2">— ...</p>
        </div>

        <div class="border border-gray-100 rounded-2xl p-4 bg-white shadow-sm">
            <div class="flex items-center gap-2 mb-4">
                <span class="text-base">🎧</span>
                <h2 class="text-xs font-extrabold text-gray-700 uppercase tracking-wider">
                    Sélectionne ton ambiance de révision
                </h2>
            </div>

            <div id="liste-musiques-container" class="space-y-3">
                </div>
        </div>

    </div> <div id="zen-player-ui" class="hidden fixed bottom-6 left-4 right-4 max-w-md mx-auto bg-gray-900 text-white p-3.5 rounded-xl shadow-xl flex items-center justify-between z-50 transition-all duration-300">
        <div class="flex items-center gap-3 overflow-hidden w-3/4">
            <div class="w-2 h-2 rounded-full bg-green-500 animate-ping shrink-0"></div>
            <p id="current-track-title" class="text-xs font-semibold truncate text-gray-200">Aucune piste en cours</p>
        </div>
        
        <div class="absolute bottom-0 left-0 h-1 bg-green-500 transition-all duration-150 rounded-b-xl" id="player-progress" style="width: 0%;"></div>

        <button id="player-play-trigger" onclick="toggleZenPlayback()" class="w-8 h-8 rounded-full bg-white text-gray-900 flex items-center justify-center focus:outline-none hover:scale-105 active:scale-95 transition-transform text-xs shrink-0 shadow">
            <i class="fas fa-play"></i>
        </button>
    </div>


    <script src="zen.js"></script>

</body>
  </html>
